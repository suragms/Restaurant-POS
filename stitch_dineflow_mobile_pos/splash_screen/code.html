<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-gradient {
            background: linear-gradient(135deg, #FF6B35 0%, #1E293B 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .loading-shimmer {
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            background-size: 200% 100%;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md overflow-hidden">
<!-- Splash Screen Container -->
<main class="relative h-screen w-full flex flex-col items-center justify-between splash-gradient overflow-hidden">
<!-- Subtle Ambient Glows -->
<div class="absolute top-[-10%] right-[-10%] w-[300px] h-[300px] bg-primary opacity-20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-[400px] h-[400px] bg-secondary-fixed opacity-10 blur-[100px] rounded-full"></div>
<!-- Top Spacer for Vertical Balance -->
<div class="flex-1"></div>
<!-- Brand Identity Core -->
<div class="relative z-10 flex flex-col items-center space-y-lg animate-in fade-in zoom-in duration-700">
<!-- Brand Logo Placeholder -->
<div class="relative group">
<div class="absolute inset-0 bg-white opacity-20 blur-2xl rounded-full scale-125 transition-transform duration-500 group-hover:scale-150"></div>
<img alt="CravePOS Logo" class="relative w-32 h-32 md:w-40 md:h-40 object-contain drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfhUyHyzWuhKkWkZ7kNzLWwe5X2DTrZSnbwS5iV8Ulz0x2RfN_s-LW0s_SkkRcjtvIgCfgaRFJm8dthFhHy9EosNYjYTlg0dpWAOn_EnVwSajb8MOFZ8WWNFyhX0b31_A4n8kPZvOm8nnznFoTYYjqvOcwc3pR-n5tE9vJoO9xzcha40pFkG06JnkgTU2cckahimJnZ6tf3HCO0aTTMcmSo6nzB9Fm7qxq1b2XT2Xl5ykjYezBMx0us-JUCkh-qClYm5c7TT7_dSbB"/>
</div>
<!-- Premium Text Treatment -->
<div class="text-center space-y-base">
<h1 class="font-display-lg text-[42px] leading-tight text-white tracking-tighter drop-shadow-md">
                    CravePOS
                </h1>
<p class="font-label-caps text-white/70 tracking-[0.2em] uppercase">
                    Precision in every plate
                </p>
</div>
</div>
<!-- Loading Progress & Footer -->
<div class="flex-1 flex flex-col justify-end pb-xl w-full px-safe-area max-w-md space-y-lg">
<!-- Glassmorphic Loading Bar -->
<div class="space-y-sm">
<div class="flex justify-between items-center px-xs">
<span class="font-label-caps text-white/80">Synchronizing Kitchen...</span>
<span class="font-label-caps text-white/80">74%</span>
</div>
<div class="h-1.5 w-full glass-effect rounded-full overflow-hidden p-[1px]">
<div class="h-full w-[74%] bg-white rounded-full relative overflow-hidden">
<div class="absolute inset-0 loading-shimmer"></div>
</div>
</div>
</div>
<!-- Footer Meta -->
<div class="flex flex-col items-center space-y-xs opacity-60">
<p class="font-body-sm text-white text-[12px]">Version 4.2.0 • Secure Fintech Protocol</p>
<div class="flex items-center space-x-sm">
<span class="material-symbols-outlined text-[14px] text-white">verified_user</span>
<span class="font-label-caps text-white text-[10px]">PCI-DSS COMPLIANT</span>
</div>
</div>
</div>
<!-- Decorative UI Element (Asymmetric Bottom Accent) -->
<div class="absolute bottom-0 right-0 w-1/3 h-1 bg-white/10 blur-sm rounded-tl-full"></div>
</main>
