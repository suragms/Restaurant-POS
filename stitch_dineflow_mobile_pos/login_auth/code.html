        }

            background-color: #fff8f6;
            background-image:

<body class="bg-mesh min-h-screen flex flex-col font-body-md text-on-surface antialiased overflow-x-hidden">
<!-- Top Navigation (Simplified for Transactional Page) -->
<header class="h-16 flex items-center justify-center px-safe-area z-40 fixed top-0 w-full bg-transparent">
<div class="font-display-lg text-display-lg text-primary tracking-tight">CravePOS</div>
</header>
<main class="flex-1 flex items-center justify-center px-safe-area pt-16 pb-8">
<div class="w-full max-w-md">
<!-- Hero Illustration / Logo Section -->
<div class="flex flex-col items-center mb-lg">
<div class="w-20 h-20 bg-primary-container rounded-3xl flex items-center justify-center shadow-xl mb-md transform rotate-3">
<span class="material-symbols-outlined text-on-primary-container text-[40px]">restaurant</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface text-center">Welcome Back</h1>
<p class="font-body-md text-on-surface-variant mt-xs text-center">Sign in to manage your station</p>
</div>
<!-- Login Card -->
<div class="glass-panel p-lg rounded-3xl shadow-2xl relative overflow-hidden">
<!-- Abstract Glow Decors -->
<div class="absolute -top-20 -right-20 w-40 h-40 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-20 -left-20 w-40 h-40 bg-tertiary-container/10 rounded-full blur-3xl"></div>
<form class="space-y-lg relative z-10">
<!-- Identity Input -->
<div class="group relative">
<label class="font-label-caps text-on-surface-variant block mb-xs">Staff Email or ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
<input class="w-full h-14 pl-12 pr-md bg-surface-container-lowest border-none rounded-xl focus:ring-2 focus:ring-primary/20 transition-all font-body-md" placeholder="chef.alain@crave.com" type="text"/>
</div>
</div>
<!-- OTP Input Section -->
<div class="space-y-md">
<div class="flex justify-between items-end">
<label class="font-label-caps text-on-surface-variant">Security PIN</label>
<button class="text-primary font-label-caps hover:underline" type="button">Forgot PIN?</button>
</div>
<div class="flex justify-between gap-2">
<input class="w-full h-14 text-center text-display-lg font-display-lg bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all outline-none rounded-t-lg" maxlength="1" type="text" value="5"/>
<input class="w-full h-14 text-center text-display-lg font-display-lg bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all outline-none rounded-t-lg" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-display-lg font-display-lg bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all outline-none rounded-t-lg" maxlength="1" placeholder="•" type="text"/>
<input class="w-full h-14 text-center text-display-lg font-display-lg bg-surface-container-lowest border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all outline-none rounded-t-lg" maxlength="1" placeholder="•" type="text"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-gradient-to-r from-[#FF6B35] to-[#FF8C61] text-on-primary font-headline-md text-headline-md rounded-xl shadow-[0_8px_20px_rgba(255,107,53,0.3)] active:scale-95 transition-all flex items-center justify-center gap-sm" type="submit">
                        Sign In
                        <span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-md py-sm">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-caps text-on-surface-variant">Quick Access</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Secondary Options -->
<div class="grid grid-cols-2 gap-md">
<button class="h-14 bg-surface-container-lowest border border-outline-variant/30 rounded-xl flex items-center justify-center gap-sm hover:bg-surface-container-low transition-colors active:scale-95" type="button">
<img alt="Google" class="w-6 h-6" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDosXPYffxLirtGfCXANdZ_tQDNmk1CKxIaVOqqwKVee3GCT0cfpvhg4I0oIGFNHH3_g_5aNDAxBkddWRBcn6WdmnI8cRlf8vTWUaL2911vpl_uCpHAXblahberxlxevZZ2eMYQx5UrfwEGsJkgpF93ENEBvSKSAgDT6Afak4cmoNmr2jfPUsWy2gIIP0rtiTC5ZVe89pP7K-ayAQJXt4x9GiAV8aNr2z5ndLuLDSU3vfURvdP-m3k1qJX7IaHl0L84yvrSRNdGiwJd"/>
<span class="font-title-sm text-on-surface">Google</span>
</button>

<span class="material-symbols-outlined text-primary">face</span>
<span class="font-title-sm text-on-surface">Face ID</span>
</button>
</div>
</form>
</div>
<!-- Footer Meta -->
<p class="mt-lg text-center font-body-sm text-on-surface-variant/60">
                New staff member? <a class="text-primary font-bold" href="#">Request Access</a>
</p>
</div>

<div class="fixed bottom-0 left-0 w-full h-48 pointer-events-none z-0 overflow-hidden opacity-40">
<img class="w-full h-full object-cover mix-blend-overlay blur-lg" data-alt="A blurred, professional kitchen environment with soft warm lighting reflecting off stainless steel surfaces. The scene conveys a busy yet orderly atmosphere of a high-end restaurant kitchen during preparation. The colors are muted with warm orange highlights to match the CravePOS brand identity." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCNyzUwwHmB_WGw-R9VeFeW08jSB8TvShKSyKOMGhuaMtq-pBC388IjBPTAg_HH-B148Qstk4hgMDCDhYogYm5CpwmTL5v884B_CA0FVGr2Dr3v80wG7rsskiDixpYM1d4GdJc3cp_qnjK3MY5U3HJqYq3B60G5S7NR-6RSYTUqd3vcVJ6oEOoEIlpedoGb8hSYXBVnPi1rvgDnHMGaGNL6kjzfv3VjwgBHC-Swu9-kIPbzDTH3TR36vrrKi-0HwBgaEFx3tR5q_Fnz"/>
</div>
<!-- Toast Mockup (Success state hint) -->
<div class="fixed bottom-lg left-1/2 -translate-x-1/2 flex items-center gap-sm px-md py-sm bg-inverse-surface text-inverse-on-surface rounded-full shadow-lg transition-transform translate-y-24">
<span class="material-symbols-outlined text-secondary-fixed">check_circle</span>
<span class="font-body-sm">Biometric authenticated. Redirecting...</span>
